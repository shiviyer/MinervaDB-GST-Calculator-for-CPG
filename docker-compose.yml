# =============================================================================
# MinervaDB GST Calculator for CPG
# File: docker-compose.yml
# Description: Production-ready Docker Compose stack for API-first deployment
#              PostgreSQL 16 + PostgREST + Swagger UI
# Brand: MinervaDB GST Calculator for CPG
# License: MIT
#
# Services:
#   postgres    — PostgreSQL 16 database (minervadb_gst_cpg)
#   postgrest   — PostgREST API server (auto-generates REST API from gst schema)
#   swagger     — Swagger UI for interactive API documentation
#   pgadmin     — pgAdmin 4 for database management (dev/staging only)
#
# Quick start:
#   cp .env.example .env          # Edit credentials
#   docker-compose up -d          # Start all services
#   docker-compose exec postgres psql -U gst_admin -d minervadb_gst_cpg \
#       -f /docker-entrypoint-initdb.d/init.sql
#
# API will be available at: http://localhost:3000
# Swagger UI at:            http://localhost:8080
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
    # PostgreSQL 16 — Primary database
      # ---------------------------------------------------------------------------
        postgres:
            image: postgres:16-alpine
                container_name: minervadb_gst_postgres
                    restart: unless-stopped
                        environment:
                              POSTGRES_DB:       minervadb_gst_cpg
                                    POSTGRES_USER:     gst_admin
                                          POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
                                                POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
                                                    volumes:
                                                          - postgres_data:/var/lib/postgresql/data
                                                                - ./schema:/docker-entrypoint-initdb.d/schema:ro
                                                                      - ./functions:/docker-entrypoint-initdb.d/functions:ro
                                                                            - ./views:/docker-entrypoint-initdb.d/views:ro
                                                                                  - ./triggers:/docker-entrypoint-initdb.d/triggers:ro
                                                                                        - ./data:/docker-entrypoint-initdb.d/data:ro
                                                                                              - ./postgrest:/docker-entrypoint-initdb.d/postgrest:ro
                                                                                                    - ./init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
                                                                                                        ports:
                                                                                                              - "5432:5432"
                                                                                                                  healthcheck:
                                                                                                                        test: ["CMD-SHELL", "pg_isready -U gst_admin -d minervadb_gst_cpg"]
                                                                                                                              interval: 10s
                                                                                                                                    timeout: 5s
                                                                                                                                          retries: 5
                                                                                                                                              shm_size: 256mb
                                                                                                                                                  command: >
                                                                                                                                                        postgres
                                                                                                                                                                -c shared_buffers=256MB
                                                                                                                                                                        -c effective_cache_size=768MB
                                                                                                                                                                                -c work_mem=16MB
                                                                                                                                                                                        -c maintenance_work_mem=64MB
                                                                                                                                                                                                -c max_connections=100
                                                                                                                                                                                                        -c wal_level=replica
                                                                                                                                                                                                                -c archive_mode=off
                                                                                                                                                                                                                        -c log_min_duration_statement=1000
                                                                                                                                                                                                                                -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
                                                                                                                                                                                                                                        -c log_checkpoints=on
                                                                                                                                                                                                                                                -c log_connections=on
                                                                                                                                                                                                                                                        -c log_disconnections=on
                                                                                                                                                                                                                                                                -c log_lock_waits=on
                                                                                                                                                                                                                                                                        -c log_temp_files=0
                                                                                                                                                                                                                                                                                -c checkpoint_completion_target=0.9
                                                                                                                                                                                                                                                                                        -c random_page_cost=1.1
                                                                                                                                                                                                                                                                                                -c effective_io_concurrency=200
                                                                                                                                                                                                                                                                                                        -c default_statistics_target=100
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                          # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                            # PostgREST — Auto-generated REST API from PostgreSQL gst schema
                                                                                                                                                                                                                                                                                                              # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                postgrest:
                                                                                                                                                                                                                                                                                                                    image: postgrest/postgrest:v12.2.3
                                                                                                                                                                                                                                                                                                                        container_name: minervadb_gst_api
                                                                                                                                                                                                                                                                                                                            restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                depends_on:
                                                                                                                                                                                                                                                                                                                                      postgres:
                                                                                                                                                                                                                                                                                                                                              condition: service_healthy
                                                                                                                                                                                                                                                                                                                                                  environment:
                                                                                                                                                                                                                                                                                                                                                        PGRST_DB_URI:             "postgres://authenticator:${AUTHENTICATOR_PASSWORD:-changeme}@postgres:5432/minervadb_gst_cpg"
                                                                                                                                                                                                                                                                                                                                                              PGRST_DB_SCHEMAS:         "gst"
                                                                                                                                                                                                                                                                                                                                                                    PGRST_DB_ANON_ROLE:       "gst_readonly"
                                                                                                                                                                                                                                                                                                                                                                          PGRST_DB_EXTRA_SEARCH_PATH: "public"
                                                                                                                                                                                                                                                                                                                                                                                PGRST_SERVER_PORT:        "3000"
                                                                                                                                                                                                                                                                                                                                                                                      PGRST_DB_POOL:            "10"
                                                                                                                                                                                                                                                                                                                                                                                            PGRST_DB_MAX_ROWS:        "1000"
                                                                                                                                                                                                                                                                                                                                                                                                  PGRST_LOG_LEVEL:          "info"
                                                                                                                                                                                                                                                                                                                                                                                                        PGRST_OPENAPI_MODE:       "follow-privileges"
                                                                                                                                                                                                                                                                                                                                                                                                              PGRST_OPENAPI_SECURITY_ACTIVE: "true"
                                                                                                                                                                                                                                                                                                                                                                                                                    PGRST_JWT_SECRET:         "${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars}"
                                                                                                                                                                                                                                                                                                                                                                                                                          PGRST_DB_PRE_REQUEST:     "gst.set_session_context"
                                                                                                                                                                                                                                                                                                                                                                                                                                PGRST_SERVER_TIMING_ENABLED: "true"
                                                                                                                                                                                                                                                                                                                                                                                                                                      PGRST_ADMIN_SERVER_PORT:  "3001"
                                                                                                                                                                                                                                                                                                                                                                                                                                          ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                - "3000:3000"
                                                                                                                                                                                                                                                                                                                                                                                                                                                      - "3001:3001"
                                                                                                                                                                                                                                                                                                                                                                                                                                                          healthcheck:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ready || exit 1"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      interval: 10s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timeout: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  retries: 5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Swagger UI — Interactive API documentation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          swagger:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              image: swaggerapi/swagger-ui:latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  container_name: minervadb_gst_swagger
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          depends_on:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - postgrest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          API_URL: "http://localhost:3000/"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                SWAGGER_JSON_URL: "http://localhost:3000/"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - "8080:8080"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # pgAdmin 4 — Database management UI (disable in production)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ---------------------------------------------------------------------------
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  pgadmin:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      image: dpage/pgadmin4:latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          container_name: minervadb_gst_pgadmin
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  profiles: ["dev"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      depends_on:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - postgres
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      PGADMIN_DEFAULT_EMAIL:    "${PGADMIN_EMAIL:-admin@minervadb.xyz}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-changeme}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  PGADMIN_CONFIG_SERVER_MODE: "False"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - pgadmin_data:/var/lib/pgadmin
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - "5050:80"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        postgres_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            driver: local
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              pgadmin_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  driver: local
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    default:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: minervadb_gst_network
