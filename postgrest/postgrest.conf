# =============================================================================
  # MinervaDB GST Calculator for CPG
  # File: postgrest/postgrest.conf
  # Description: PostgREST configuration for API-first GST Calculator
  # Brand: MinervaDB GST Calculator for CPG
  # License: MIT
  #
  # PostgREST exposes the gst schema automatically as a REST API.
  # All views, tables, and RPC functions in the gst schema are accessible
  # via standard HTTP verbs. No application server required.
  #
  # API Endpoints automatically generated by PostgREST:
  #
  #   Tables & Views (CRUD):
  #     GET    /hsn_code_master          — List HSN codes (filterable, pageable)
  #     GET    /gst_rate_master          — List GST rates by HSN
  #     GET    /state_master             — List state codes
  #     GET    /party_master             — List parties (buyers/sellers)
  #     GET    /tax_invoice              — List invoices
  #     GET    /invoice_line_item        — List line items
  #     GET    /itc_ledger               — ITC ledger entries
  #     GET    /v_invoice_tax_summary    — Invoice tax summary (view)
  #     GET    /v_monthly_tax_liability  — Monthly liability (view)
  #     GET    /v_hsn_wise_summary       — HSN-wise summary (view)
  #     GET    /v_itc_balance            — ITC balance (view)
  #     GET    /v_gstr1_b2b              — GSTR-1 B2B data (view)
  #     GET    /v_gstr3b_outward_summary — GSTR-3B summary (view)
  #     GET    /mv_gstr3b_tax_liability  — Pre-agg GSTR-3B mat view
  #
  #   RPC Functions (POST to /rpc/<function>):
  #     POST   /rpc/calculate_invoice_tax     — Calculate GST for a line item
  #     POST   /rpc/calculate_line_item_tax   — Detailed line-level calculation
  #     POST   /rpc/create_tax_invoice        — Create full invoice with tax
  #     POST   /rpc/cancel_invoice            — Cancel an invoice
  #     POST   /rpc/create_credit_note        — Create credit note
  #     POST   /rpc/get_invoice_summary       — Get invoice JSON (for printing)
  #     POST   /rpc/prepare_gstr1_data        — Prepare GSTR-1 JSON payload
  #     POST   /rpc/prepare_gstr3b_data       — Prepare GSTR-3B JSON payload
  #     POST   /rpc/get_gst_rate              — Lookup GST rate for HSN
  #     POST   /rpc/lookup_hsn_for_product    — Search HSN by product description
  #     POST   /rpc/get_applicable_cess       — Calculate cess for sin goods
  #     POST   /rpc/validate_gstin            — Validate GSTIN checksum
  #     POST   /rpc/determine_place_of_supply — Determine POS state code
  #     POST   /rpc/record_itc               — Record ITC entry
  #     POST   /rpc/compute_itc_eligibility  — Check ITC eligibility
  # =============================================================================

# Database connection
db-uri = "postgres://gst_user:CHANGE_ME@localhost:5432/minervadb_gst_cpg"

  # Expose the gst schema
  db-schemas = "gst"

  # Anonymous role (read-only public access — restrict further in production)
  db-anon-role = "gst_readonly"

  # Extra search path
  db-extra-search-path = "public"

  # Server settings
  server-host = "0.0.0.0"
  server-port = 3000

  # JWT Authentication (RS256 recommended for production)
  # jwt-secret = "your-256-bit-secret-here"
  # jwt-secret-is-base64 = false
  # jwt-aud = "minervadb-gst-api"

  # Connection pool
  db-pool = 10
  db-pool-acquisition-timeout = 30

  # OpenAPI
  openapi-mode = "follow-privileges"
  openapi-security-active = true

  # Maximum rows returned without Range header
  db-max-rows = 1000

  # Statement timeout (ms)
  db-pre-request = "gst.set_session_context"

  # Logging
  log-level = "info"

  # Server timing header (perf monitoring)
  server-timing-enabled = true

  # Admin server (internal metrics)
  admin-server-port = 3001
